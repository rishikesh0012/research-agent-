[pytest]
minversion = 7.0
addopts = -v --strict-markers --tb=short
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    asyncio: marks tests as async
    integration: marks tests as integration tests
norecursedirs = .git .venv venv __pycache__ *.egg-info
